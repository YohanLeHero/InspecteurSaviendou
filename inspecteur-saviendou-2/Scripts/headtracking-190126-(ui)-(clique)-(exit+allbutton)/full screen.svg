<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <rect width="24" height="24" fill="transparent"></rect>
  
  <!-- Flèche haut-gauche -->
  <line x1="8" y1="8" x2="3" y2="3" stroke="white" stroke-width="2" stroke-linecap="round"></line>
  <line x1="3" y1="8" x2="3" y2="3" stroke="white" stroke-width="2" stroke-linecap="round"></line>
  <line x1="8" y1="3" x2="3" y2="3" stroke="white" stroke-width="2" stroke-linecap="round"></line>

  <!-- Flèche haut-droit -->
  <line x1="16" y1="8" x2="21" y2="3" stroke="white" stroke-width="2" stroke-linecap="round"></line>
  <line x1="21" y1="3" x2="21" y2="8" stroke="white" stroke-width="2" stroke-linecap="round"></line>
  <line x1="16" y1="3" x2="21" y2="3" stroke="white" stroke-width="2" stroke-linecap="round"></line>

  <!-- Flèche bas-gauche -->
  <line x1="8" y1="16" x2="3" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"></line>
  <line x1="3" y1="16" x2="3" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"></line>
  <line x1="8" y1="21" x2="3" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"></line>

  <!-- Flèche bas-droit -->
  <line x1="16" y1="16" x2="21" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"></line>
  <line x1="21" y1="16" x2="21" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"></line>
  <line x1="16" y1="21" x2="21" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"></line>
</svg>
